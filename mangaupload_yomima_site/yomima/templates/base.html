<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}よみま{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Sans+JP:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
{% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

<header class="site-header">
  <div class="container">
    <div class="inner" style="justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
      <div style="display:flex;align-items:baseline;gap:1rem;">
        <a href="/" class="site-title">よみ<span>ま</span></a>
        <span class="site-sub">manga reader // zip · cbz · rar · cbr</span>
      </div>
      <nav style="display:flex;gap:.75rem;align-items:center;">
        <a href="/public" id="nav-public"  class="btn btn-sm btn-ghost">📖 公開作品</a>
        <a href="/"       id="nav-mylist" class="btn btn-sm btn-ghost">📚 マイリスト</a>
      </nav>
    </div>
  </div>
</header>

<main class="container page-enter">
  {% block content %}{% endblock %}
</main>

</body>
</html>
